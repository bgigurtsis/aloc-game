<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent renderer options, round 2</title>
<style>
  :root {
    --bg: #04070a;
    --ink: #9ab0a4;
    --dim: #44544c;
    --accent: #7dffb0;
    --glow1: rgba(125, 255, 176, 0.55);
    --glow2: rgba(60, 255, 140, 0.22);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
    padding: 28px;
  }
  h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.18em; color: var(--accent); margin-bottom: 4px; }
  p.sub { font-size: 11px; color: var(--dim); margin-bottom: 26px; }
  .grid {
    display: grid;
    grid-template-columns: 150px repeat(7, 236px);
    gap: 6px 10px;
    align-items: center;
  }
  .colhead {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: center;
    padding-bottom: 6px;
  }
  .rowhead {
    font-size: 11px;
    color: var(--ink);
    line-height: 1.5;
    padding-right: 10px;
  }
  .rowhead b { display: block; color: var(--accent); font-weight: 500; font-size: 12px; margin-bottom: 4px; }
  .tile {
    width: 236px;
    height: 244px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #0d1812;
    background: radial-gradient(ellipse at center, #060c08 0%, var(--bg) 75%);
    overflow: hidden;
  }
  pre {
    color: var(--accent);
    text-shadow: 0 0 6px var(--glow1), 0 0 20px var(--glow2);
    line-height: 1;
    letter-spacing: 0;
    white-space: pre;
  }
  pre.braille { font-size: 15px; }
  pre.ramp    { font-size: 12px; }
</style>
</head>
<body>
<h1>AGENT OPTIONS, ROUND 2: CONNECTIONS</h1>
<p class="sub">two braille, two glyph ramp. rows 1A/4A read as a neural net, 1B as a virus, 4B as a multi-agent swarm.</p>
<div class="grid" id="grid"></div>

<script>
"use strict";

/* ---------- deterministic helpers ---------- */

function hash(x, y, s) {
  let h = Math.imul(x | 0, 0x9E3779B1) ^ Math.imul(y | 0, 0x85EBCA77) ^ Math.imul(s | 0, 0xC2B2AE3D);
  h = Math.imul(h ^ (h >>> 15), 0x27D4EB2F);
  h ^= h >>> 15;
  return (h >>> 0) / 4294967296;
}

function smooth(t) { return t * t * (3 - 2 * t); }

function valueNoise(x, y, s) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = smooth(x - ix), fy = smooth(y - iy);
  const a = hash(ix, iy, s), b = hash(ix + 1, iy, s);
  const c = hash(ix, iy + 1, s), d = hash(ix + 1, iy + 1, s);
  return a + (b - a) * fx + (c - a) * fy + (a - b - c + d) * fx * fy;
}

/* ---------- field primitives ---------- */

function blobField(b, x, y) {
  const dx = x - b.x, dy = y - b.y;
  const d2 = (dx * dx + dy * dy) / (b.r * b.r);
  if (d2 >= 1) return 0;
  return b.i * Math.pow(1 - d2, b.p || 2);
}

function segField(s, x, y) {
  const dx = s.bx - s.ax, dy = s.by - s.ay;
  const L2 = dx * dx + dy * dy;
  let t = L2 > 0 ? ((x - s.ax) * dx + (y - s.ay) * dy) / L2 : 0;
  t = Math.max(0, Math.min(1, t));
  const px = s.ax + dx * t, py = s.ay + dy * t;
  const ddx = x - px, ddy = y - py;
  const d2 = (ddx * ddx + ddy * ddy) / (s.w * s.w);
  if (d2 >= 1) return 0;
  const q = 1 - d2;
  return s.i * q * q;
}

/* ---------- model builders ---------- */
/* a model is { blobs, segs, warp, rough }. nodes become blobs, edges become segs. */

function graphToModel(nodes, edges, warp, rough) {
  const blobs = nodes.map(n => ({ x: n.x, y: n.y, r: n.r, i: n.i, p: 2.4 }));
  const segs = edges.map(e => ({
    ax: nodes[e.a].x, ay: nodes[e.a].y,
    bx: nodes[e.b].x, by: nodes[e.b].y,
    w: e.w, i: e.i
  }));
  return { blobs, segs, warp, rough };
}

function dimModel(m, k) {
  return {
    blobs: m.blobs.map(b => ({ ...b, i: b.i * k })),
    segs: m.segs.map(s => ({ ...s, i: s.i * k, w: s.w * 0.85 })),
    warp: m.warp * 1.4, rough: m.rough
  };
}

function filaments(segs, x, y, angle, steps, width, seed, intensity) {
  let px = x, py = y, a = angle, w = width, i = intensity;
  for (let t = 0; t < steps; t++) {
    const nx = px + Math.cos(a) * 0.042, ny = py + Math.sin(a) * 0.042;
    segs.push({ ax: px, ay: py, bx: nx, by: ny, w: Math.max(0.007, w), i });
    px = nx; py = ny;
    a += (hash(t, seed, 5) - 0.5) * 1.0;
    w *= 0.93; i *= 0.97;
    if (hash(t, seed, 9) < 0.22 && steps - t > 2) {
      filaments(segs, px, py, a + (hash(t, seed, 13) > 0.5 ? 0.9 : -0.9),
                Math.ceil((steps - t) * 0.6), w * 0.8, seed * 7 + t + 1, i * 0.8);
    }
  }
}

/* ----- model A: neural net graph ----- */

function netGraph(stage) {
  const nodes = [], edges = [];
  const N = (x, y, r, i) => { nodes.push({ x, y, r: r || 0.042, i: i || 1 }); return nodes.length - 1; };
  const E = (a, b, w, i) => edges.push({ a, b, w: w || 0.010, i: i || 0.5 });

  function coreCluster(cx, cy, scale, bright) {
    const c = N(cx, cy, 0.05 * scale, 1.15 * bright);
    const p1 = N(cx - 0.08 * scale, cy - 0.06 * scale, 0.028 * scale, 0.85 * bright);
    const p2 = N(cx + 0.09 * scale, cy - 0.05 * scale, 0.028 * scale, 0.85 * bright);
    const p3 = N(cx + 0.01 * scale, cy + 0.09 * scale, 0.028 * scale, 0.85 * bright);
    E(c, p1); E(c, p2); E(c, p3); E(p1, p2, 0.008, 0.4); E(p2, p3, 0.008, 0.4);
    return c;
  }

  switch (stage) {
    case 0:
      coreCluster(0.5, 0.5, 1, 1);
      break;
    case 1: {
      const c = coreCluster(0.5, 0.5, 1, 1);
      for (let k = 0; k < 5; k++) {
        const a = (k / 5) * Math.PI * 2 + 0.5;
        const s = N(0.5 + Math.cos(a) * 0.35, 0.5 + Math.sin(a) * 0.35, 0.018, 0.7);
        E(c, s, 0.007, 0.32);
      }
      break;
    }
    case 3: {
      const c = coreCluster(0.46, 0.52, 1, 1);
      const m1 = N(0.70, 0.38, 0.034, 0.9), m2 = N(0.74, 0.62, 0.034, 0.9);
      const m3 = N(0.28, 0.30, 0.030, 0.85), m4 = N(0.24, 0.68, 0.030, 0.85);
      const t1 = N(0.88, 0.30, 0.022, 0.8), t2 = N(0.90, 0.55, 0.022, 0.8);
      E(c, m1); E(c, m2); E(c, m3); E(c, m4);
      E(m1, m2, 0.008, 0.4); E(m1, t1); E(m2, t2); E(t1, t2, 0.007, 0.35); E(m3, m4, 0.007, 0.3);
      break;
    }
    case 4: {
      const c = coreCluster(0.42, 0.58, 0.95, 0.9);
      const m1 = N(0.62, 0.44, 0.032, 0.85);
      E(c, m1);
      const frag = N(0.87, 0.15, 0.045, 1.2);
      const mid = N(0.74, 0.30, 0.016, 0.7);
      E(m1, mid, 0.008, 0.55); E(mid, frag, 0.008, 0.65);
      break;
    }
    case 5: {
      const c1 = coreCluster(0.29, 0.63, 0.9, 1);
      const c2 = coreCluster(0.72, 0.32, 0.9, 1);
      const b = N(0.51, 0.47, 0.016, 0.6);
      E(c1, b, 0.008, 0.4); E(b, c2, 0.008, 0.4);
      break;
    }
    case 6: {
      const pos = [
        [0.50, 0.50, 0.045, 1.1], [0.20, 0.24, 0.034, 0.95], [0.80, 0.20, 0.034, 0.95],
        [0.16, 0.60, 0.030, 0.9], [0.84, 0.58, 0.030, 0.9], [0.32, 0.84, 0.030, 0.9],
        [0.68, 0.86, 0.030, 0.9], [0.48, 0.16, 0.026, 0.85], [0.10, 0.42, 0.020, 0.8],
        [0.92, 0.40, 0.020, 0.8], [0.36, 0.38, 0.022, 0.85], [0.64, 0.62, 0.022, 0.85],
        [0.54, 0.74, 0.018, 0.8]
      ];
      const ids = pos.map(p => N(p[0], p[1], p[2], p[3]));
      const links = [[0,10],[0,11],[0,7],[10,1],[10,8],[1,7],[7,2],[2,9],[9,4],[4,11],[11,6],[6,12],[12,5],[5,3],[3,8],[0,12],[10,3],[11,2]];
      links.forEach(l => E(ids[l[0]], ids[l[1]], 0.008, 0.42));
      break;
    }
  }
  return graphToModel(nodes, edges, 0.02, 0.45);
}

function netModel(stage) {
  if (stage === 2) return dimModel(netGraph(1), 0.5);
  return netGraph(stage);
}

/* ----- model B: virus with branching filaments ----- */

function virusModel(stage) {
  const blobs = [], segs = [];
  const core = (x, y, r, i, p) => blobs.push({ x, y, r, i, p: p || 1.8 });

  switch (stage) {
    case 0:
      core(0.5, 0.5, 0.15, 1.0);
      break;
    case 1:
      core(0.5, 0.5, 0.15, 1.05);
      [0.3, 1.5, 2.7, 3.9, 5.2].forEach((a, k) =>
        filaments(segs, 0.5 + Math.cos(a) * 0.12, 0.5 + Math.sin(a) * 0.12, a, 5, 0.014, 11 + k, 0.7));
      break;
    case 2:
      core(0.5, 0.5, 0.19, 0.55, 1.1);
      [1.1, 4.0].forEach((a, k) =>
        filaments(segs, 0.5 + Math.cos(a) * 0.13, 0.5 + Math.sin(a) * 0.13, a, 3, 0.010, 31 + k, 0.35));
      break;
    case 3:
      core(0.5, 0.5, 0.14, 1.05);
      [0.2, 1.1, 2.0, 2.9, 3.8, 4.7, 5.6].forEach((a, k) =>
        filaments(segs, 0.5 + Math.cos(a) * 0.11, 0.5 + Math.sin(a) * 0.11, a, 8, 0.016, 51 + k, 0.78));
      break;
    case 4: {
      core(0.40, 0.60, 0.13, 0.95);
      [1.6, 2.9, 4.1].forEach((a, k) =>
        filaments(segs, 0.40 + Math.cos(a) * 0.10, 0.60 + Math.sin(a) * 0.10, a, 5, 0.013, 71 + k, 0.6));
      /* one determined filament reaching the far corner */
      let px = 0.50, py = 0.50;
      const tx = 0.86, ty = 0.16, steps = 9;
      for (let t = 0; t < steps; t++) {
        const u = (t + 1) / steps;
        const nx = 0.50 + (tx - 0.50) * u + (valueNoise(t * 0.8, 3.3, 77) - 0.5) * 0.07;
        const ny = 0.50 + (ty - 0.50) * u + (valueNoise(t * 0.8, 7.7, 77) - 0.5) * 0.07;
        segs.push({ ax: px, ay: py, bx: nx, by: ny, w: 0.011, i: 0.65 });
        px = nx; py = ny;
      }
      core(0.86, 0.16, 0.06, 1.15, 2.4);
      break;
    }
    case 5:
      core(0.30, 0.62, 0.115, 1.0);
      core(0.72, 0.32, 0.115, 1.0);
      [0.8, 2.4, 4.2].forEach((a, k) =>
        filaments(segs, 0.30 + Math.cos(a) * 0.09, 0.62 + Math.sin(a) * 0.09, a, 5, 0.013, 91 + k, 0.65));
      [1.7, 3.6, 5.4].forEach((a, k) =>
        filaments(segs, 0.72 + Math.cos(a) * 0.09, 0.32 + Math.sin(a) * 0.09, a, 5, 0.013, 111 + k, 0.65));
      segs.push({ ax: 0.38, ay: 0.55, bx: 0.55, by: 0.46, w: 0.010, i: 0.5 });
      segs.push({ ax: 0.55, ay: 0.46, bx: 0.64, by: 0.38, w: 0.010, i: 0.5 });
      break;
    case 6: {
      const cells = [[0.22, 0.26, 0.085], [0.52, 0.52, 0.10], [0.80, 0.22, 0.07],
                     [0.26, 0.76, 0.08], [0.76, 0.74, 0.075], [0.50, 0.12, 0.05]];
      cells.forEach((c, k) => {
        core(c[0], c[1], c[2], 0.95);
        [0.5 + k, 2.5 + k, 4.5 + k].forEach((a, j) =>
          filaments(segs, c[0] + Math.cos(a) * c[2] * 0.8, c[1] + Math.sin(a) * c[2] * 0.8, a, 5, 0.012, 131 + k * 10 + j, 0.6));
      });
      break;
    }
  }
  return { blobs, segs, warp: 0.08, rough: 0.85 };
}

/* ----- model C: multi-agent swarm ----- */

function swarmGraph(stage) {
  const nodes = [], edges = [];
  const N = (x, y, r, i) => { nodes.push({ x, y, r: r || 0.020, i: i || 0.9 }); return nodes.length - 1; };
  const E = (a, b, w, i) => edges.push({ a, b, w: w || 0.0075, i: i || 0.45 });

  function swarm(cx, cy, count, spread, seed, hubR) {
    const hub = N(cx, cy, hubR || 0.030, 1.1);
    const members = [];
    for (let k = 0; k < count; k++) {
      const a = hash(k, 1, seed) * Math.PI * 2;
      const d = 0.05 + hash(k, 2, seed) * spread;
      const m = N(cx + Math.cos(a) * d, cy + Math.sin(a) * d, 0.014 + hash(k, 3, seed) * 0.010, 0.85);
      E(hub, m);
      members.push(m);
    }
    for (let k = 0; k + 1 < members.length; k += 2) E(members[k], members[k + 1], 0.006, 0.3);
    return hub;
  }

  switch (stage) {
    case 0: {
      const a = N(0.47, 0.47, 0.024, 1.05), b = N(0.56, 0.50, 0.020, 0.9),
            c = N(0.49, 0.57, 0.020, 0.9), d = N(0.42, 0.53, 0.017, 0.85);
      E(a, b); E(b, c); E(c, d); E(d, a); E(a, c, 0.006, 0.35);
      break;
    }
    case 1: {
      const hub = swarm(0.5, 0.5, 4, 0.06, 7, 0.028);
      for (let k = 0; k < 6; k++) {
        const a = (k / 6) * Math.PI * 2 + 0.3;
        const s = N(0.5 + Math.cos(a) * 0.34, 0.5 + Math.sin(a) * 0.34, 0.012, 0.65);
        E(hub, s, 0.005, 0.25);
      }
      break;
    }
    case 3: {
      const h1 = swarm(0.38, 0.44, 6, 0.13, 21, 0.032);
      const h2 = swarm(0.68, 0.62, 5, 0.12, 22, 0.030);
      E(h1, h2, 0.008, 0.5);
      break;
    }
    case 4: {
      const h1 = swarm(0.36, 0.62, 6, 0.12, 41, 0.032);
      let prev = h1;
      for (let t = 1; t <= 4; t++) {
        const u = t / 5;
        const m = N(0.36 + (0.86 - 0.36) * u, 0.62 + (0.16 - 0.62) * u + Math.sin(t * 2.1) * 0.03, 0.013, 0.7 + u * 0.3);
        E(prev, m, 0.006, 0.45);
        prev = m;
      }
      const frag = N(0.87, 0.14, 0.028, 1.15);
      E(prev, frag, 0.006, 0.55);
      break;
    }
    case 5: {
      const h1 = swarm(0.29, 0.63, 7, 0.13, 61, 0.032);
      const h2 = swarm(0.72, 0.33, 7, 0.13, 62, 0.032);
      E(h1, h2, 0.008, 0.45);
      break;
    }
    case 6: {
      const h1 = swarm(0.26, 0.28, 5, 0.11, 81, 0.030);
      const h2 = swarm(0.74, 0.24, 5, 0.11, 82, 0.030);
      const h3 = swarm(0.50, 0.62, 6, 0.13, 83, 0.034);
      const h4 = swarm(0.20, 0.78, 4, 0.09, 84, 0.026);
      const h5 = swarm(0.80, 0.76, 4, 0.09, 85, 0.026);
      E(h1, h2, 0.008, 0.45); E(h1, h3, 0.008, 0.45); E(h2, h3, 0.008, 0.45);
      E(h3, h4, 0.008, 0.45); E(h3, h5, 0.008, 0.45);
      break;
    }
  }
  return graphToModel(nodes, edges, 0.025, 0.5);
}

function swarmModel(stage) {
  if (stage === 2) return dimModel(swarmGraph(1), 0.5);
  return swarmGraph(stage);
}

/* ---------- field evaluation ---------- */

const STAGES = [
  "dormant", "discovery", "defence evasion", "resource acquisition",
  "exfiltration", "replication", "persistence"
];

function makeField(model, stage, seedBase) {
  const seed = stage * 13 + seedBase;
  return function (x, y) {
    const wx = x + (valueNoise(x * 5, y * 5, seed) - 0.5) * model.warp;
    const wy = y + (valueNoise(x * 5 + 31, y * 5 + 17, seed) - 0.5) * model.warp;
    let f = 0;
    for (const b of model.blobs) f += blobField(b, wx, wy);
    for (const s of model.segs) f += segField(s, wx, wy);
    f *= 1 + (valueNoise(x * 9, y * 9, seed + 99) - 0.5) * model.rough;
    return Math.max(0, Math.min(1.4, f));
  };
}

/* ---------- renderers ---------- */

function renderBraille(fieldFn, stage, seedBase) {
  const CW = 22, CH = 13;
  const DW = CW * 2, DH = CH * 4;
  const bits = [[0x01, 0x08], [0x02, 0x10], [0x04, 0x20], [0x40, 0x80]];
  let out = "";
  for (let cy = 0; cy < CH; cy++) {
    for (let cx = 0; cx < CW; cx++) {
      let code = 0x2800;
      for (let dy = 0; dy < 4; dy++) {
        for (let dx = 0; dx < 2; dx++) {
          const px = (cx * 2 + dx) / DW, py = (cy * 4 + dy) / DH;
          const f = fieldFn(px, py);
          const t = 0.16 + hash(cx * 2 + dx, cy * 4 + dy, stage + seedBase + 500) * 0.30;
          if (f > t) code |= bits[dy][dx];
        }
      }
      out += String.fromCharCode(code);
    }
    out += "\n";
  }
  const pre = document.createElement("pre");
  pre.className = "braille";
  pre.textContent = out;
  return pre;
}

function renderRamp(fieldFn, stage, seedBase) {
  const W = 30, H = 17;
  const ramp = " .:-=+*#%@";
  let out = "";
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      /* 2x2 supersample so thin edges register */
      let f = 0;
      for (let sy = 0; sy < 2; sy++)
        for (let sx = 0; sx < 2; sx++)
          f += fieldFn((x + 0.25 + sx * 0.5) / W, (y + 0.25 + sy * 0.5) / H);
      f /= 4;
      const dith = (hash(x, y, stage + seedBase + 900) - 0.5) * 0.10;
      const v = Math.max(0, Math.min(0.999, f * 1.05 + dith));
      out += ramp[Math.floor(v * ramp.length)];
    }
    out += "\n";
  }
  const pre = document.createElement("pre");
  pre.className = "ramp";
  pre.textContent = out;
  return pre;
}

/* ---------- layout ---------- */

const OPTIONS = [
  { name: "1A braille neural net", note: "nodes and dotted edges. structured, machine-like.", model: netModel, render: renderBraille, seed: 1000 },
  { name: "1B braille virus", note: "cores with branching filaments. organic, infectious.", model: virusModel, render: renderBraille, seed: 2000 },
  { name: "4A ramp neural net", note: "same graph, glyph shading. edges read as faint paths.", model: netModel, render: renderRamp, seed: 3000 },
  { name: "4B ramp multi-agent swarm", note: "many small agents around hubs. a coordinated system.", model: swarmModel, render: renderRamp, seed: 4000 }
];

const grid = document.getElementById("grid");

grid.appendChild(document.createElement("div"));
STAGES.forEach((s, i) => {
  const h = document.createElement("div");
  h.className = "colhead";
  h.textContent = i + " " + s;
  grid.appendChild(h);
});

for (const opt of OPTIONS) {
  const rh = document.createElement("div");
  rh.className = "rowhead";
  rh.innerHTML = "<b>" + opt.name + "</b>" + opt.note;
  grid.appendChild(rh);
  for (let s = 0; s < 7; s++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    const model = opt.model(s);
    tile.appendChild(opt.render(makeField(model, s, opt.seed), s, opt.seed));
    grid.appendChild(tile);
  }
}
</script>
</body>
</html>
